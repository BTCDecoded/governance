rules:
  - name: consensus_proof_sync
    description: "blvm-spec and blvm-consensus must stay synchronized"
    source_repo: blvm-spec
    source_pattern: consensus-rules/**
    target_repo: blvm-consensus
    target_pattern: proofs/**
    validation: corresponding_file_exists
    bidirectional: true
    blocking: true
  
  - name: protocol_engine_equivalence
    description: "blvm-protocol must reference specific blvm-spec version"
    source_repo: blvm-protocol
    source_pattern: consensus/**
    target_repo: blvm-spec
    validation: references_latest_version
    required_reference_format: "blvm-spec@v{VERSION}"
    blocking: true
  
  - name: reference_node_no_consensus
    description: "blvm-node cannot modify consensus rules"
    source_repo: blvm-node
    validation: no_consensus_modifications
    allowed_imports_only: true
    blocking: true




